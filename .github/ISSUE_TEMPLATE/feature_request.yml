name: Feature request
description: Suggest a focused improvement that fits the bridge scope.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention simpler workarounds or existing behavior if relevant.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Responses API
        - Chat completions fallback
        - Streaming
        - OpenWebUI registration
        - Docker/Compose
        - Installer
        - Documentation
        - Tests
        - Other
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request does not require exposing secrets or private prompts.
          required: true
        - label: This request keeps the project focused on a local Codex/OpenWebUI bridge.
          required: true
