name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Compile Python files
        run: python -m py_compile src/codex_openai_bridge.py scripts/configure_openwebui_provider.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Check installer shell syntax
        run: bash -n install.sh

      - name: Validate Docker Compose config
        run: CODEX_BRIDGE_SECRET_FILE=/dev/null docker compose config >/dev/null
